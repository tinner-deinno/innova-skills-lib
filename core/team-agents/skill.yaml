id: team-agents
name: team-agents
version: 1.0.0
description: |
  [core] v26.4.18-alpha.22 G-SKLL | Spin up coordinated agent teams for any task. Reusable
  framework for TeamCreate/SendMessage/TaskList patterns. Use when user says "team-agents",
  "spin up a team", "use teammates", "parallel agents", "coordinate agents", "fan out", or
  wants multiple agents working together with coordination. Do NOT trigger for simple subagent
  work (use Agent tool directly) or inter-Oracle messaging (use /talk-to).
