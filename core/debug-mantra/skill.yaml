id: debug-mantra
name: debug-mantra
version: 1.0.0
description: |
  Four-mantra debugging discipline — reproduce, trace the fail path, falsify the hypothesis,
  cross-reference every breadcrumb. Recite the mantra block verbatim at the start of any
  debugging session, then apply the four steps in order before proposing any fix. Trigger on
  /debug-mantra and proactively whenever debugging starts — user reports a bug, says something
  is broken/throwing/failing, asks to debug/diagnose/investigate an issue, or pastes a stack
  trace or error log.
author: team/jit-bigboss
license: MIT
category: core
runtimes:
  - claude
triggers:
  - debug-mantra
  - /debug-mantra
env:
  required: []
  optional: []
