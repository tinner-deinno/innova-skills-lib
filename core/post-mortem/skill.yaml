id: post-mortem
name: post-mortem
version: 1.0.0
description: |
  Write the canonical engineering record of a fixed bug — root cause, mechanism, fix,
  validation, and how it slipped through. Engineer-audience, code identifiers welcome.
  Use after a debug session lands a fix, before closing the ticket. Trigger on /post-mortem,
  when the user says "write the post-mortem / postmortem / RCA / root cause analysis",
  "document this fix", "write up the root cause", "close out this bug with a writeup",
  or hands you a fixed-and-validated bug and asks for the writeup.
author: team/jit-bigboss
license: MIT
category: core
runtimes:
  - claude
triggers:
  - post-mortem
  - /post-mortem
env:
  required: []
  optional: []
