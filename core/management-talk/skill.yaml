id: management-talk
name: management-talk
version: 1.0.0
description: |
  Rewrite engineer-to-engineer content for engineering-org leadership (VPs, directors, PMs,
  release managers, execs in an engineering-savvy company) and shape it for the channel it
  is going to — JIRA comment, Slack post, async standup line, email, or meeting
  talking-points. Trigger when the user asks to write/rewrite for management / exec / VP /
  director / PM / release manager, asks for an "executive summary / leadership update /
  status update", says "make this less technical / less jargony", or asks for a slack /
  email / standup / meeting version of work originally written engineer-to-engineer.
